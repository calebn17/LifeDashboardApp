opt_in_rules:
  - empty_count
  - closure_spacing
  - implicitly_unwrapped_optional

disabled_rules:
  - trailing_whitespace

force_cast: error
force_try: error
implicitly_unwrapped_optional:
  severity: error

line_length:
  warning: 120
  error: 200

file_length:
  warning: 400
  error: 600

included:
  - LifeDashboard
  - LifeDashboardTests

excluded:
  - .build
  - .swiftpm
