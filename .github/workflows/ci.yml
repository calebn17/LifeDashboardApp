name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint

  unit-tests:
    runs-on: macos-14
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: swift test
